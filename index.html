<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Northern Ireland — Interactive Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #1a1a1a; color: #e0e0e0; overflow: hidden; height: 100vh; }

  #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; background: #1a1a1a; }

  /* Back button */
  #back-btn {
    display: none; position: fixed; top: 16px; left: 60px; z-index: 1000;
    background: #2a2a2a; color: #ccc; border: 1px solid #444; border-radius: 6px;
    padding: 8px 16px; font-size: 14px; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  #back-btn:hover { background: #3a3a3a; color: #fff; border-color: #666; }
  #back-btn.visible { display: flex; align-items: center; gap: 6px; }

  /* Title overlay */
  #title-overlay {
    position: fixed; top: 16px; right: 16px; z-index: 1000;
    background: rgba(26,26,26,0.85); border: 1px solid #333; border-radius: 8px;
    padding: 12px 18px; backdrop-filter: blur(8px);
  }
  #title-overlay h1 { font-size: 16px; font-weight: 600; color: #e0e0e0; letter-spacing: 0.5px; }
  #title-overlay .subtitle { font-size: 11px; color: #888; margin-top: 2px; }

  /* Choropleth controls */
  #choropleth-controls {
    position: fixed; top: 80px; right: 16px; z-index: 1000;
    background: rgba(26,26,26,0.92); border: 1px solid #333; border-radius: 8px;
    padding: 10px 14px; backdrop-filter: blur(8px);
  }
  #choropleth-controls label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.8px; display: block; margin-bottom: 6px; }
  #choropleth-select {
    background: #2a2a2a; color: #ccc; border: 1px solid #444; border-radius: 4px;
    padding: 5px 8px; font-size: 12px; font-family: inherit; width: 180px; cursor: pointer;
  }
  #choropleth-select:hover { border-color: #666; }
  #choropleth-select option { background: #2a2a2a; }

  /* Legend */
  #legend {
    position: fixed; bottom: 30px; right: 16px; z-index: 1000;
    background: rgba(26,26,26,0.92); border: 1px solid #333; border-radius: 8px;
    padding: 10px 14px; backdrop-filter: blur(8px); display: none;
    min-width: 160px;
  }
  #legend .legend-title { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  #legend .legend-bar { width: 100%; height: 12px; border-radius: 3px; margin-bottom: 4px; }
  #legend .legend-labels { display: flex; justify-content: space-between; font-size: 10px; color: #777; }

  /* Comparison mode */
  #compare-btn {
    position: fixed; top: 16px; left: 16px; z-index: 1000;
    background: #2a2a2a; color: #ccc; border: 1px solid #444; border-radius: 6px;
    padding: 8px 14px; font-size: 12px; cursor: pointer;
    transition: all 0.2s; font-family: inherit;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  #compare-btn:hover { background: #3a3a3a; color: #fff; border-color: #666; }
  #compare-btn.active { background: #1a5276; border-color: #2980b9; color: #7fb3d3; }

  /* Stats panel */
  #panel {
    position: fixed; top: 0; right: -480px; width: 480px; height: 100vh; z-index: 1001;
    background: #1e1e1e; border-left: 1px solid #333; overflow-y: auto;
    transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: -4px 0 20px rgba(0,0,0,0.4);
  }
  #panel.open { right: 0; }
  #panel::-webkit-scrollbar { width: 6px; }
  #panel::-webkit-scrollbar-track { background: #1e1e1e; }
  #panel::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

  #panel-close {
    position: sticky; top: 0; right: 0; float: right;
    background: #1e1e1e; border: none; color: #888; font-size: 22px;
    cursor: pointer; width: 40px; height: 40px; display: flex;
    align-items: center; justify-content: center; border-radius: 4px; z-index: 2;
  }
  #panel-close:hover { background: #333; color: #fff; }

  .panel-header {
    padding: 12px 20px 12px; border-bottom: 1px solid #2a2a2a;
  }
  .panel-header h2 { font-size: 18px; font-weight: 600; color: #fff; margin-right: 30px; }
  .panel-header .panel-type { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }

  /* Tabs */
  .tab-bar {
    display: flex; border-bottom: 1px solid #2a2a2a; background: #1e1e1e;
    position: sticky; top: 0; z-index: 1; overflow-x: auto;
    -webkit-overflow-scrolling: touch; scrollbar-width: none;
  }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn {
    padding: 10px 14px; font-size: 11px; color: #777; background: none; border: none;
    border-bottom: 2px solid transparent; cursor: pointer; font-family: inherit;
    white-space: nowrap; text-transform: uppercase; letter-spacing: 0.6px;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn:hover { color: #aaa; }
  .tab-btn.active { color: #7fb3d3; border-bottom-color: #2980b9; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .stat-section { padding: 14px 20px; border-bottom: 1px solid #2a2a2a; }
  .stat-section h3 { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 10px; font-weight: 500; }

  .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
  .stat-label { font-size: 12.5px; color: #aaa; }
  .stat-value { font-size: 13px; font-weight: 600; color: #e0e0e0; }
  .stat-value.positive { color: #27ae60; }
  .stat-value.negative { color: #c0392b; }

  /* Big stat cards */
  .stat-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .stat-card {
    background: #252525; border-radius: 6px; padding: 12px; text-align: center;
    border: 1px solid #2a2a2a;
  }
  .stat-card .card-value { font-size: 20px; font-weight: 700; color: #fff; }
  .stat-card .card-label { font-size: 10px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  /* Bar charts */
  .bar-chart { margin-top: 6px; }
  .bar-row { display: flex; align-items: center; margin-bottom: 6px; gap: 8px; }
  .bar-label { font-size: 11px; color: #aaa; width: 90px; flex-shrink: 0; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bar-track { flex: 1; height: 18px; background: #2a2a2a; border-radius: 3px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); min-width: 2px; }
  .bar-value { font-size: 11px; color: #ccc; width: 42px; text-align: right; flex-shrink: 0; }

  /* Horizontal bar for breakdowns */
  .h-bar-group { margin-bottom: 12px; }
  .h-bar-title { font-size: 11px; color: #aaa; margin-bottom: 4px; }
  .h-bar-container { display: flex; height: 14px; border-radius: 3px; overflow: hidden; }
  .h-bar-segment { height: 100%; transition: width 0.5s; }
  .h-bar-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; }
  .h-bar-legend-item { display: flex; align-items: center; gap: 4px; font-size: 10.5px; color: #aaa; }
  .h-bar-legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* Party colours */
  .party-sf { background: #326633; }
  .party-dup { background: #D32F2F; }
  .party-alliance { background: #E8A838; }
  .party-uup { background: #3677B0; }
  .party-sdlp { background: #2E8B57; }
  .party-tuv { background: #6B2D5B; }
  .party-pbp { background: #C62828; }
  .party-green { background: #4CAF50; }
  .party-other { background: #777; }

  /* Donut chart */
  .donut-container { display: flex; align-items: center; justify-content: center; gap: 16px; margin: 10px 0; }
  .donut-legend { display: flex; flex-direction: column; gap: 3px; }
  .donut-legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #aaa; }
  .donut-legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

  /* Deprivation indicator */
  .deprivation-meter { margin-top: 6px; }
  .meter-track { width: 100%; height: 10px; background: linear-gradient(to right, #2d5a27, #8B8B00, #c62828); border-radius: 5px; position: relative; margin: 6px 0; }
  .meter-marker { position: absolute; top: -3px; width: 4px; height: 16px; background: #fff; border-radius: 2px; transform: translateX(-50%); box-shadow: 0 0 4px rgba(0,0,0,0.5); }

  /* Population change indicator */
  .change-indicator { display: inline-flex; align-items: center; gap: 4px; }
  .change-arrow { font-size: 14px; }
  .change-arrow.up { color: #27ae60; }
  .change-arrow.down { color: #c0392b; }

  /* Comparison panel */
  #compare-panel {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 1002;
    background: rgba(26,26,26,0.95); border: 1px solid #333; border-bottom: none;
    border-radius: 8px 8px 0 0; padding: 12px 20px; backdrop-filter: blur(8px);
    display: none; min-width: 300px; text-align: center;
  }
  #compare-panel.visible { display: block; }
  #compare-panel .compare-text { font-size: 12px; color: #aaa; }
  #compare-panel .compare-areas { font-size: 13px; color: #fff; margin-top: 4px; }
  #compare-panel .compare-clear { background: none; border: 1px solid #555; color: #888; border-radius: 4px; padding: 4px 10px; font-size: 11px; cursor: pointer; margin-top: 6px; font-family: inherit; }
  #compare-panel .compare-clear:hover { border-color: #888; color: #ccc; }

  /* Side-by-side comparison view */
  .compare-view { display: flex; gap: 0; }
  .compare-col { flex: 1; min-width: 0; }
  .compare-col:first-child { border-right: 1px solid #2a2a2a; }
  .compare-col .panel-header { padding: 10px 14px 8px; }
  .compare-col .panel-header h2 { font-size: 14px; }
  .compare-col .stat-section { padding: 10px 14px; }
  .compare-col .stat-label { font-size: 11px; }
  .compare-col .stat-value { font-size: 12px; }
  .compare-col .stat-section h3 { font-size: 11px; margin-bottom: 6px; }
  .compare-highlight-better { color: #27ae60 !important; }
  .compare-highlight-worse { color: #c0392b !important; }

  /* Source footer */
  .panel-footer { padding: 12px 20px; font-size: 10px; color: #555; line-height: 1.6; }

  /* Mobile responsive */
  @media (max-width: 768px) {
    #panel { width: 100vw; right: -100vw; }
    #title-overlay { top: auto; bottom: 16px; right: 16px; left: 16px; text-align: center; }
    #choropleth-controls { top: auto; bottom: 80px; right: 8px; left: 8px; }
    #back-btn { top: 10px; left: 50px; }
    #compare-btn { top: 10px; left: 8px; padding: 6px 10px; font-size: 11px; }
    .tab-btn { padding: 8px 10px; font-size: 10px; }
    .compare-view { flex-direction: column; }
    .compare-col:first-child { border-right: none; border-bottom: 1px solid #2a2a2a; }
  }

  /* Leaflet overrides for dark theme */
  .leaflet-control-zoom a { background: #2a2a2a !important; color: #ccc !important; border-color: #444 !important; }
  .leaflet-control-zoom a:hover { background: #3a3a3a !important; color: #fff !important; }
  .leaflet-control-attribution { background: rgba(26,26,26,0.7) !important; color: #555 !important; font-size: 10px !important; }
  .leaflet-control-attribution a { color: #666 !important; }
</style>
</head>
<body>

<div id="map"></div>

<button id="compare-btn" onclick="toggleCompareMode()">
  <svg width="14" height="14" viewBox="0 0 16 16" fill="none" style="vertical-align:-2px;margin-right:4px"><path d="M8 1v14M2 4h4M10 4h4M2 8h4M10 8h4M2 12h4M10 12h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Compare
</button>

<button id="back-btn" onclick="zoomToNI()">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
  All Districts
</button>

<div id="title-overlay">
  <h1>Northern Ireland</h1>
  <div class="subtitle">Interactive Boundary Map</div>
</div>

<div id="choropleth-controls">
  <label>Colour by</label>
  <select id="choropleth-select" onchange="updateChoropleth()">
    <option value="none">Default</option>
    <option value="population_density">Population Density</option>
    <option value="deprivation">Deprivation Rank</option>
    <option value="median_income">Median Income</option>
    <option value="house_price">House Prices</option>
    <option value="crime_rate">Crime Rate</option>
    <option value="degree_pct">% Degree-Educated</option>
    <option value="no_car_pct">% No Car</option>
    <option value="catholic_pct">% Catholic</option>
    <option value="protestant_pct">% Protestant</option>
  </select>
</div>

<div id="legend">
  <div class="legend-title" id="legend-title"></div>
  <div class="legend-bar" id="legend-bar"></div>
  <div class="legend-labels"><span id="legend-min"></span><span id="legend-max"></span></div>
</div>

<div id="compare-panel">
  <div class="compare-text" id="compare-text">Click two districts to compare</div>
  <div class="compare-areas" id="compare-areas"></div>
  <button class="compare-clear" onclick="clearComparison()">Clear</button>
</div>

<div id="panel">
  <button id="panel-close" onclick="closePanel()">&times;</button>
  <div id="panel-content"></div>
</div>

<script src="geo-data.js"></script>
<script src="stats-data.js"></script>
<script src="ward-stats.js"></script>
<script src="app.js"></script>
</body>
</html>
